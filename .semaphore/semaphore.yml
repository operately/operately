version: v1.0
name: Operately — Build & Test
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2404

auto_cancel:
  running:
    when: "branch != 'main'"

blocks:
  - name: License Check
    dependencies: []
    task:
      secrets:
        - name: ci-cache-credentials
      prologue:
        commands:
          - checkout
          - cache restore app-deps
          - cache restore app-build
          - cache restore app-node-modules
          - cache restore turboui-node-modules
          - cache restore turboui-dist
          - ./scripts/cache-fix-for-erlang
          - make test.up
      jobs:
        - name: Licence Check
          commands:
            - make test.license.check

  - name: Turboui
    run:
      when: "change_in('/turboui', {default_branch: 'main'})"
    dependencies: []
    task:
      secrets:
        - name: ci-cache-credentials
      prologue:
        commands:
          - checkout
          - cache restore turboui-node-modules

      jobs:
        - name: Turbo Lint
          commands:
            - make test.setup.turboui
            - make turboui.build

        - name: Turbo Test
          commands:
            - make test.setup.turboui
            - make turboui.test

      epilogue:
        always:
          commands:
            - "[ -f turboui/testreports/junit.xml ] && test-results publish turboui/testreports/junit.xml"

  - name: App Tests
    run:
      when: "change_in('/app', {default_branch: 'main'}) or change_in('/turboui', {default_branch: 'main'})"
    dependencies: []
    task:
      secrets:
        - name: ci-cache-credentials
      prologue:
        commands:
          - checkout
          - cache restore app-deps
          - cache restore app-build
          - cache restore app-node-modules
          - cache restore cli-node-modules
          - cache restore turboui-node-modules
          - cache restore turboui-dist
          - ./scripts/cache-fix-for-erlang

      jobs:
        - name: Lint
          commands:
            - make test.setup.lint
            - make test.js.dead.code
            - make test.tsc.lint
            - make test.cli.catalog.sync
            - make test.elixir.warnings
            - make test.pr.name
            - make test.icons.check

        - name: Dialyzer
          commands:
            - make test.setup.dialyzer
            - make test.dialyzer

        - name: Unit Tests
          parallelism: 2
          commands:
            - make test.setup.unit
            - make test.mix.unit INDEX=$SEMAPHORE_JOB_INDEX TOTAL=$SEMAPHORE_JOB_COUNT

        - name: EE Tests
          commands:
            - make test.setup.ee
            - make test.ee

        - name: JS Tests
          commands:
            - make test.setup.js
            - make test.npm

        - name: Features
          parallelism: 18
          commands:
            - make test.setup.features
            - make test.mix.features INDEX=$SEMAPHORE_JOB_INDEX TOTAL=$SEMAPHORE_JOB_COUNT

      epilogue:
        always:
          commands:
            - "[ -f app/testreports/junit.xml ] && test-results publish app/testreports/junit.xml"
            - ./scripts/publish_retries_report.sh app/testreports/retries.md
            - artifact push workflow screenshots

  - name: CLI and MCP E2E
    run:
      when: "change_in('/cli', {default_branch: 'main'}) or change_in('/app', {default_branch: 'main'})"
    dependencies: []
    task:
      secrets:
        - name: ci-cache-credentials
      prologue:
        commands:
          - checkout
          - cache restore app-deps
          - cache restore app-build
          - cache restore app-node-modules
          - cache restore turboui-node-modules
          - cache restore turboui-dist
          - cache restore cli-node-modules
          - ./scripts/cache-fix-for-erlang

      jobs:
        - name: CLI Unit Tests
          commands:
            - make cli.test.unit

        - name: CLI E2E Tests
          commands:
            - make test.setup.cli_e2e
            - make cli.test.e2e

        - name: MCP E2E Tests
          commands:
            - make test.setup.mcp_e2e
            - make mcp.test.e2e

      epilogue:
        always:
          commands:
            - "[ -f app/testreports/junit.xml ] && test-results publish app/testreports/junit.xml"
            - ./scripts/publish_retries_report.sh app/testreports/retries.md

  - name: Docker Build
    dependencies: []
    task:
      secrets:
        - name: docker-push
      prologue:
        commands:
          - checkout
          - cache restore
      jobs:
        - name: "Docker Release"
          commands:
            - docker pull operately/operately:latest
            - make docker.build
            - 'if [[ "$SEMAPHORE_GIT_BRANCH" = "main" && "$SEMAPHORE_GIT_REF_TYPE" = "branch" ]]; then make docker.push; else echo "Skipping Docker push"; fi'

after_pipeline:
  task:
    jobs:
      - name: Publish Results
        commands:
          - test-results gen-pipeline-report
          - checkout
          - mkdir -p /tmp/retries-md
          - artifact pull workflow retries-md -f -d /tmp/retries-md || true
          - ./scripts/build_retries_report.sh /tmp/retries-md > /tmp/REPORT.md
          - artifact push workflow -d .semaphore/REPORT.md /tmp/REPORT.md

promotions:
  - name: Publish Dev Image
    pipeline_file: devimage.yml
    auto_promote:
      when: "result = 'passed' and branch = 'main'"

  - name: Populate CI Cache
    pipeline_file: cache.yml
    auto_promote:
      when: "result = 'passed' and branch = 'main'"
