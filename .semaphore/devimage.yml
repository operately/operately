version: v1.0
name: Publish Dev Image
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2404

blocks:
  - name: Publish Dev Image
    run:
      when: "branch = 'main' and change_in('/docker/dev', {default_branch: 'main'})"
    task:
      secrets:
        - name: docker-push
      prologue:
        commands:
          - checkout
          - cache restore
          - docker buildx create --name devimage-builder --driver docker-container --use
          - docker buildx inspect --bootstrap
      jobs:
        - name: Publish Dev Image
          commands:
            - make devimage.build
