version: v1.0
name: Sync API Docs
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2404
blocks:
  - name: Sync API Docs
    dependencies: []
    run:
      when: "branch = 'main'"
    task:
      secrets:
        - name: docs-sync
      jobs:
        - name: "Sync API Docs"
          commands:
            - checkout
            - bash scripts/sync_api_docs_to_website.sh
